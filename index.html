<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBC TITAN | Professional SaaS</title>
    <script src="https://unpkg.com/coi-serviceworker"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjijSc9bNh2CXJiEfR7WgCT77CNscSTPs",
            authDomain: "titan-app-vbc.firebaseapp.com",
            projectId: "titan-app-vbc",
            storageBucket: "titan-app-vbc.firebasestorage.app",
            messagingSenderId: "700768811307",
            appId: "1:700768811307:web:32c8afd9dda8133d302d6e",
            measurementId: "G-CVSEGK99E7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Tracker & UI Logic
        window.checkKey = async () => {
            const user = auth.currentUser;
            const key = document.getElementById('keyIn').value;
            if(key === "TITAN-VBC-7777") { // In production, we check this in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    active: true,
                    keyUsed: key,
                    lastLogin: new Date().toISOString(),
                    email: user.email,
                    location: "Pakistan (Auto-detected)"
                }, { merge: true });
                location.reload();
            } else { alert("Invalid License Key!"); }
        };

        window.loginWithGoogle = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).then((result) => {
                console.log("User Logged In");
            }).catch(err => alert(err.message));
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('licenseSection').classList.remove('hidden');
                // Check if already active
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists() && docSnap.data().active) {
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'grid';
                }
            }
        });
    </script>

    <style>
        :root { --pr-blue: #410CD9; }
        body { background: #fbfbfd; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .vbc-main-btn { background: var(--pr-blue); color: white; padding: 14px 32px; border-radius: 99px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .vbc-main-btn:hover { transform: scale(1.05); }
        .gate-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="gate" class="gate-overlay">
    <img src="logo.png" class="h-20 mb-6" onerror="this.src='https://via.placeholder.com/80'">
    <h1 class="text-4xl font-black mb-2 tracking-tighter">TITAN PHOENIX V12</h1>
    
    <div id="loginSection" class="p-8">
        <p class="text-gray-500 mb-8">Login with your professional ID to continue</p>
        <button onclick="loginWithGoogle()" class="border-2 border-gray-200 px-10 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-gray-50 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5">
            Continue with Google
        </button>
    </div>

    <div id="licenseSection" class="hidden p-8">
        <p class="text-gray-500 mb-6 font-medium">Almost there! Enter your subscription key.</p>
        <input type="text" id="keyIn" placeholder="XXXX-XXXX-XXXX" class="w-[350px] p-5 border-2 rounded-2xl text-center font-black text-2xl mb-6 outline-none focus:border-indigo-600">
        <br>
        <button onclick="checkKey()" class="vbc-main-btn w-[350px] py-5">Activate System</button>
        <p class="mt-8 text-sm">New user? Contact Fahad for a license:</p>
        <a href="https://wa.me/923217452433?text=Hi%20Fahad,%20I'm%20ready%20to%20buy%20Titan%20Phoenix%20License." class="text-green-600 font-black text-lg">+92 321 7452433</a>
    </div>
</div>

<div id="mainApp" class="hidden grid-cols-3 h-screen pt-20">
    <div class="p-10 text-center col-span-3">
        <h2 class="text-2xl font-bold">System Authenticated. Loading Neural Engine...</h2>
        <p>Your activity is being logged in the owner dashboard.</p>
        </div>
</div>

</body>
</html>
