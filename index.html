<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBC TITAN | Neural Phoenix</title>
    
    <script src="https://unpkg.com/coi-serviceworker"></script>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --pr-blue: #410CD9; --sidebar-w: 300px; }
        body { background: #000; color: #1d1d1f; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .app-grid { position: relative; display: grid; grid-template-columns: var(--sidebar-w) 1fr 280px; height: 100vh; padding-top: 80px; z-index: 10; }
        .sidebar, .inspector { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(20px); border-right: 1px solid #e5e5e5; overflow-y: auto; padding: 25px; }
        .inspector { border-left: 1px solid #e5e5e5; }
        .stage { display: flex; align-items: center; justify-content: center; position: relative; overflow: auto; }
        .vbc-main-btn { background: var(--pr-blue); color: white; padding: 14px 32px; border-radius: 99px; font-weight: 700; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(65,12,217,0.2); transition: 0.3s; }
        .vbc-main-btn:hover { transform: scale(1.02); background: #3309b5; }
        .tool-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px; font-size: 13px; font-weight: 600; color: #444; border-radius: 14px; margin-bottom: 8px; cursor: pointer; }
        .tool-btn:hover { background: #f4f4ff; color: var(--pr-blue); }
        canvas#mainCanvas { background: white; box-shadow: 0 40px 100px rgba(0,0,0,0.3); max-width: 90%; max-height: 75vh; border-radius: 12px; }
        .gate-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: white; padding: 35px; border-radius: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="fixed top-0 w-full h-20 bg-white/95 backdrop-blur-md border-b flex items-center justify-between px-10 z-[1000]">
    <div class="flex items-center gap-6">
        <img src="logo.png" style="height:40px;" onerror="this.src='https://via.placeholder.com/40'">
        <span class="font-black text-xl tracking-tighter uppercase">Titan <span class="text-indigo-600">Phoenix</span></span>
    </div>
    <button onclick="downAsset()" class="vbc-main-btn text-sm">Download Render</button>
</nav>

<div id="mainApp" class="app-grid" style="display:none;">
    <aside class="sidebar">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6">Neural Core</p>
        <button class="tool-btn" onclick="runBgRemove()"><span>✂️</span> Background Removal</button>
        <button class="tool-btn" onclick="applyShadow()"><span>🌓</span> AI Realistic Shadows</button>
        <button class="tool-btn" onclick="applyFX('beauty')"><span>💎</span> Product Beautifier</button>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-10 mb-6">Design Tools</p>
        <button class="tool-btn" onclick="addText()"><span>✍️</span> Add Neural Text</button>
        <button class="tool-btn" onclick="document.getElementById('brandUp').click()"><span>📁</span> Import Logo</button>
        <input type="file" id="brandUp" hidden onchange="loadBrandLogo(event)">
        <button class="tool-btn" onclick="applyWatermark()"><span>🛡️</span> Apply Branding</button>
    </aside>

    <main class="stage">
        <div id="loader">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-xs font-black text-gray-800">NEURAL PROCESSING...</p>
        </div>
        <div id="dropzone" class="text-center p-20 border-2 border-dashed border-gray-300 rounded-[50px] bg-white/90 backdrop-blur-sm shadow-xl">
            <h3 class="text-2xl font-black mb-6">Upload Product Photo</h3>
            <button onclick="document.getElementById('mainUp').click()" class="vbc-main-btn px-16">Select Image</button>
            <input type="file" id="mainUp" hidden onchange="handleMainUpload(event)">
        </div>
        <div id="canvasWrap" class="hidden"><canvas id="mainCanvas"></canvas></div>
    </main>

    <aside class="inspector">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-10">Fine Tuning</p>
        <div class="space-y-8">
            <div><label class="text-[11px] font-bold block mb-3">BRIGHTNESS</label><input type="range" class="w-full accent-indigo-600" oninput="updateF()" id="br" min="0" max="200" value="100"></div>
            <div><label class="text-[11px] font-bold block mb-3">CONTRAST</label><input type="range" class="w-full accent-indigo-600" oninput="updateF()" id="co" min="0" max="200" value="100"></div>
            <div><label class="text-[11px] font-bold block mb-3">SATURATION</label><input type="range" class="w-full accent-indigo-600" oninput="updateF()" id="sa" min="0" max="200" value="100"></div>
        </div>
    </aside>
</div>

<div id="licenseGate" class="gate-overlay">
    <h2 class="text-3xl font-black mb-8 tracking-tighter">TITAN PHOENIX V12</h2>
    <input type="text" id="keyIn" placeholder="TITAN-VBC-XXXX" class="w-[320px] p-5 border-2 rounded-2xl text-center font-bold text-xl outline-none focus:border-indigo-500 transition-all mb-6">
    <button onclick="checkKey()" class="vbc-main-btn w-[320px] py-5">Unlock Neural Core</button>
</div>

<script>
    // Futuristic BG
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const pGeom = new THREE.BufferGeometry();
    const pPos = new Float32Array(1200 * 3);
    for(let i=0; i<3600; i++) pPos[i] = (Math.random()-0.5)*10;
    pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMesh = new THREE.Points(pGeom, new THREE.PointsMaterial({ size: 0.005, color: '#410CD9' }));
    scene.add(pMesh); camera.position.z = 4;
    function animate() { requestAnimationFrame(animate); pMesh.rotation.y += 0.001; renderer.render(scene, camera); }
    animate();

    const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    let activeImg = null, brandLogo = null;

    function checkKey() {
        if(document.getElementById('keyIn').value === "TITAN-VBC-7777") {
            localStorage.setItem('vbc_auth', 'true'); location.reload();
        } else alert("Invalid Key");
    }

    function handleMainUpload(e) {
        const r = new FileReader(); r.onload = (ev) => {
            const img = new Image(); img.onload = () => {
                // FIXED: Aggressive Resizing for Stability
                let w = img.width, h = img.height;
                const limit = 1000; 
                if(w > limit || h > limit) {
                    const rati = Math.min(limit/w, limit/h);
                    w *= rati; h *= rati;
                }
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                activeImg = canvas.toDataURL("image/png");
                document.getElementById('dropzone').style.display = 'none';
                document.getElementById('canvasWrap').classList.remove('hidden');
            }; img.src = ev.target.result;
        }; r.readAsDataURL(e.target.files[0]);
    }

    async function runBgRemove() {
        if(!activeImg) return;
        document.getElementById('loader').style.display = 'block';
        try {
            // FIX: Direct CDN path for GitHub Pages stability
            const blob = await imglyRemoveBackground(activeImg, { 
                publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/" 
            });
            const img = new Image(); img.onload = () => {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(img,0,0);
                document.getElementById('loader').style.display = 'none';
                activeImg = canvas.toDataURL(); 
            };
            img.src = URL.createObjectURL(blob);
        } catch(e) { 
            document.getElementById('loader').style.display = 'none'; 
            alert("Neural Engine Busy. Please try a smaller file or refresh.");
        }
    }

    function updateF() {
        const b = document.getElementById('br').value, c = document.getElementById('co').value, s = document.getElementById('sa').value;
        canvas.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
    }

    function applyFX(t) { if(t==='beauty') { document.getElementById('sa').value = 140; updateF(); } }
    function applyShadow() { canvas.style.filter += ' drop-shadow(0 30px 40px rgba(0,0,0,0.4))'; }
    function loadBrandLogo(e) { const r = new FileReader(); r.onload = (ev) => { const i = new Image(); i.onload = () => brandLogo = i; i.src = ev.target.result; }; r.readAsDataURL(e.target.files[0]); }
    function applyWatermark() { 
        if(!brandLogo) return alert("Logo first!");
        const s = canvas.width * 0.15;
        ctx.globalAlpha = 0.6; ctx.drawImage(brandLogo, canvas.width-s-20, canvas.height-s-20, s, s); ctx.globalAlpha = 1;
    }
    function addText() {
        const t = prompt("Text:"); if(!t) return;
        ctx.font = "bold 50px Inter"; ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.fillText(t, canvas.width/2, canvas.height - 40);
    }
    function downAsset() { const a = document.createElement('a'); a.download='titan_render.png'; a.href=canvas.toDataURL(); a.click(); }

    window.onload = () => {
        if(localStorage.getItem('vbc_auth') === 'true') {
            document.getElementById('licenseGate').style.display = 'none';
            document.getElementById('mainApp').style.display = 'grid';
        }
    };
</script>
</body>
</html>
