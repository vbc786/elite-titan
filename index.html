<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBC TITAN | Neural Phoenix</title>
    
    <script src="https://unpkg.com/coi-serviceworker"></script>
    
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" href="./logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --pr-blue: #410CD9; --sidebar-w: 300px; }
        body { background: #000; color: #1d1d1f; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .app-grid { position: relative; display: grid; grid-template-columns: var(--sidebar-w) 1fr 280px; height: 100vh; padding-top: 80px; z-index: 10; }
        .sidebar, .inspector { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px); border-right: 1px solid #e5e5e5; overflow-y: auto; padding: 25px; }
        .inspector { border-left: 1px solid #e5e5e5; border-right: none; }
        .stage { display: flex; align-items: center; justify-content: center; position: relative; overflow: auto; background: transparent; }
        .vbc-main-btn { background: var(--pr-blue); color: white; padding: 14px 32px; border-radius: 99px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; box-shadow: 0 10px 20px rgba(65,12,217,0.25); }
        .vbc-main-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(65,12,217,0.4); }
        .tool-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px; font-size: 13px; font-weight: 500; color: #444; border-radius: 14px; transition: 0.2s; cursor: pointer; margin-bottom: 6px; }
        .tool-btn:hover { background: #f0f0ff; color: var(--pr-blue); }
        canvas#mainCanvas { background: white; box-shadow: 0 40px 100px rgba(0,0,0,0.3); max-width: 90%; max-height: 75vh; border-radius: 12px; }
        .gate-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center; }
        .brand-logo-big { height: 50px; width: auto; }
        .lock-logo { height: 140px; width: auto; margin-bottom: 40px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="fixed top-0 w-full h-20 bg-white/95 backdrop-blur-md border-b flex items-center justify-between px-10 z-[1000]">
    <div class="flex items-center gap-6">
        <img src="logo.png" class="brand-logo-big" alt="VBC Logo">
        <div class="h-10 w-[1px] bg-gray-200"></div>
        <span class="font-black text-xl tracking-tighter uppercase">Titan <span class="text-indigo-600">Phoenix</span></span>
    </div>
    <div class="flex gap-4">
        <button onclick="downAsset()" class="vbc-main-btn text-sm">Download Render</button>
    </div>
</nav>

<div id="mainApp" class="app-grid" style="display:none;">
    <aside class="sidebar">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6">Neural Core</p>
        <button class="tool-btn" onclick="runBgRemove()"><span>✂️</span> Background Removal</button>
        <button class="tool-btn" onclick="applyShadow()"><span>🌓</span> AI Realistic Shadows</button>
        <button class="tool-btn" onclick="applyFX('beauty')"><span>💎</span> Product Beautifier</button>
        <button class="tool-btn" onclick="applyFX('iron')"><span>💨</span> AI Fabric Ironing</button>
        <button class="tool-btn" onclick="applyFX('ghost')"><span>👤</span> Ghost Mannequin</button>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-10 mb-6">Design Tools</p>
        <button class="tool-btn" onclick="addText()"><span>✍️</span> Add Neural Text</button>
        <button class="tool-btn" onclick="document.getElementById('brandUp').click()"><span>📁</span> Brand Kit / Logo</button>
        <input type="file" id="brandUp" hidden onchange="loadBrandLogo(event)">
        <button class="tool-btn" onclick="applyWatermark()"><span>🛡️</span> Apply Branding</button>
    </aside>

    <main class="stage">
        <div id="loader">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-xs font-black text-gray-800 uppercase tracking-widest">Processing Image...</p>
        </div>
        <div id="dropzone" class="text-center p-24 border-2 border-dashed border-gray-300 rounded-[60px] bg-white/90 backdrop-blur-md shadow-2xl">
            <img src="logo.png" class="h-24 mx-auto mb-10 opacity-30">
            <h3 class="text-3xl font-black mb-4">Neural Editor Ready</h3>
            <p class="text-gray-400 mb-10">Upload any size product photo</p>
            <button onclick="document.getElementById('mainUp').click()" class="vbc-main-btn px-16">Upload Photo</button>
            <input type="file" id="mainUp" hidden onchange="handleMainUpload(event)">
        </div>
        <div id="canvasWrap" class="hidden"><canvas id="mainCanvas"></canvas></div>
    </main>

    <aside class="inspector">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-10">Fine Tuning</p>
        <div class="space-y-8">
            <div><div class="flex justify-between text-[11px] font-bold mb-3"><span>BRIGHTNESS</span><span id="bV">100</span></div>
            <input type="range" class="w-full accent-indigo-600" oninput="updateF()" id="br" min="0" max="200" value="100"></div>
            <div><div class="flex justify-between text-[11px] font-bold mb-3"><span>CONTRAST</span><span id="cV">100</span></div>
            <input type="range" class="w-full accent-indigo-600" oninput="updateF()" id="co" min="0" max="200" value="100"></div>
            <div><div class="flex justify-between text-[11px] font-bold mb-3"><span>SATURATION</span><span id="sV">100</span></div>
            <input type="range" class="w-full accent-indigo-600" oninput="update
